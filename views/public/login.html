<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiME | Inicio de Sesión</title>
    
    <!-- FUENTES -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

    <!-- ICONO Y ESTILOS -->
    <link rel="icon" type="image/x-icon" href="/assets/icons/favicon.ico">
    <link rel="stylesheet" href="/assets/styles/login_style.css">
</head>
<body>

    <div class="left-panel">

    <div class="decorative-bars">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>

    <div class="brand-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="2" x2="12" y2="22"></line>
            <line x1="2" y1="12" x2="22" y2="12"></line>
            <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"></line>
            <line x1="4.93" y1="19.07" x2="19.07" y2="4.93"></line>
        </svg>
    </div>

    <!-- TEXTO DE BIENVENIDA -->
    <div class="content-wrap">
        <h1 class="title">
            <span id="typewriter-text" style="white-space: pre-line;"></span><span id="typewriter-cursor">|</span>
        </h1>
        <p class="desc">
            Administra tus Métricas y obtén Diagnósticos Automáticos para tu E-Commerce.
        </p>
    </div>

    <div class="footer">
        <a href="https://github.com/KelvysB13/DiME-Project" target="_blank" rel="noopener noreferrer" class="github-link">
            <svg fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>

        </a>
        <div class="copyright">
            &copy; 2026 DiME Team. All rights reserved.
        </div>
    </div>
</div>

    <!-- PANEL DERECHO: FORMULARIO DE LOGIN -->
    <div class="right-panel">

        <div class="form-container">

            <!-- LOGO -->
            <div class="logo-wrap">
                <a href="/"><img src="/assets/images/DiME_Logo.png" alt="DiME Logo"></a>
            </div>
            
            <!-- FORMULARIO -->
            <form class="login-form" id="loginForm">
                <h2 class="welcome-title">INGRESE SUS CREDENCIALES</h2>

                <!-- CAMPO EMAIL -->
                <div class="form-group email" id="email-group">
                    <svg class="input-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                    <input type="email" id="email" placeholder="Correo Electrónico">
                    <span class="field-error" id="email-error"></span>
                </div>

                <!-- CAMPO CONTRASEÑA + BOTON VISIBILIDAD -->
                <div class="form-group password" id="password-group">
                    <svg class="input-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                    <input type="password" id="password" placeholder="Contraseña">
                    <button type="button" id="togglePassword" class="toggle-btn">
                        <svg id="eyeIcon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                    <span class="field-error" id="password-error"></span>
                </div>

                <!-- CHECKBOX RECORDAR -->
                <div class="remember-row">
                    <input type="checkbox" id="remember">
                    <label for="remember">Recordar Sesión</label>
                </div>

                <div class="buttons-wrap">
                    <button type="submit" class="btn-primary">
                        Iniciar Sesión
                    </button>
                </div>

                <div id="mensaje" class="mensaje"></div>

            </form>

            <!-- ENLACE OLVIDO CONTRASEÑA -->
            <div class="forgot-row">
                ¿Olvidaste tu contraseña?
                <a href="#">Haz clic aquí</a>.
            </div>

        </div>
    </div>

<!-- SCRIPT: LOGIN FORM HANDLER -->
    <script src="/forms/loginForm.js"></script>

    <!-- SCRIPT: MOSTRAR/OCULTAR CONTRASEÑA -->
    <script>
        document.getElementById('togglePassword').addEventListener('click', function () 
        {
            const password = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');

            if (password.type === 'password') 
            {
                password.type = 'text';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/>';
            } 

            else 
            {
                password.type = 'password';
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
            }
        });

        const text = "Tus datos, en \nmovimiento.";
        const el = document.getElementById('typewriter-text');
        let i = 0;
        let deleting = false;

        function typeWriter() 
        {
            if (!deleting) 
            {
                if (i < text.length) 
                {
                    el.textContent += text.charAt(i);
                    i++;
                    setTimeout(typeWriter, 55 + Math.random() * 45);
                } 

                else 
                {
                    deleting = true;
                    setTimeout(typeWriter, 1500);
                }
            } 
            else 
            {
                if (i > 0) 
                {
                    el.textContent = text.substring(0, i - 1);
                    i--;
                    setTimeout(typeWriter, 30 + Math.random() * 25);
                } 

                else 
                {
                    deleting = false;
                    setTimeout(typeWriter, 500);
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => setTimeout(typeWriter, 400));
    </script>
</body>
</html>
