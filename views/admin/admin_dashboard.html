<!DOCTYPE html>
<html lang="es">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="../../assets/styles/user_dashboard_style.css">
  <style>
    .admin-layout { display: flex; min-height: 100vh; }
    .admin-content { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .admin-main { flex: 1; padding: 20px; max-width: 1280px; margin: 0 auto; width: 100%; overflow-y: auto; }
    .crud-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    .crud-header h2 { font-size: 18px; font-weight: 700; color: var(--primary); }
    .btn-create { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background-color: var(--primary); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Montserrat', sans-serif; transition: background 0.15s ease; }
    .btn-create:hover { background-color: var(--primary-light); }
    .btn-edit { padding: 4px 10px; background: none; border: 1px solid var(--border); border-radius: 4px; font-size: 11px; cursor: pointer; color: var(--primary); font-family: 'Montserrat', sans-serif; font-weight: 500; transition: all 0.1s ease; }
    .btn-edit:hover { border-color: var(--primary); background-color: rgba(3,28,60,0.04); }
    .btn-delete { padding: 4px 10px; background: none; border: 1px solid var(--border); border-radius: 4px; font-size: 11px; cursor: pointer; color: var(--danger); font-family: 'Montserrat', sans-serif; font-weight: 500; transition: all 0.1s ease; }
    .btn-delete:hover { border-color: var(--danger); background-color: rgba(239,68,68,0.06); }
    .table-actions { display: flex; gap: 4px; justify-content: center; }
    .admin-table-wrap { overflow-x: auto; }
    .search-bar { padding: 8px 12px; background-color: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 12px; color: var(--text); outline: none; font-family: 'Montserrat', sans-serif; transition: border-color 0.15s ease; width: 220px; }
    .search-bar:focus { border-color: var(--primary); }
    .crud-toolbar { display: flex; align-items: center; gap: 12px; }

    .modal-overlay { position: fixed; inset: 0; background-color: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
    .modal-box { background-color: #fff; border-radius: var(--radius-lg); width: 100%; max-width: 560px; max-height: 85vh; display: flex; flex-direction: column; box-shadow: var(--shadow-xl); animation: fadeIn 0.15s ease-out; }
    .modal-box.wide { max-width: 720px; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border-light); }
    .modal-header h3 { font-size: 15px; font-weight: 700; color: var(--primary); }
    .modal-close { width: 28px; height: 28px; border-radius: 50%; border: none; background: none; cursor: pointer; font-size: 16px; color: var(--text-muted); display: flex; align-items: center; justify-content: center; transition: all 0.1s ease; }
    .modal-close:hover { background-color: var(--bg); color: var(--text); }
    .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 14px 20px; border-top: 1px solid var(--border-light); }
    .modal-footer .btn-cancel { padding: 8px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: none; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-secondary); font-family: 'Montserrat', sans-serif; transition: all 0.1s ease; }
    .modal-footer .btn-cancel:hover { border-color: var(--text-muted); color: var(--text); }
    .modal-footer .btn-save { padding: 8px 16px; border-radius: var(--radius-sm); border: none; background-color: var(--primary); color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Montserrat', sans-serif; transition: background 0.15s ease; }
    .modal-footer .btn-save:hover { background-color: var(--primary-light); }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-grid .full-width { grid-column: 1 / -1; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.04em; }
    .form-group input, .form-group select, .form-group textarea { padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 12px; color: var(--text); outline: none; font-family: 'Montserrat', sans-serif; transition: border-color 0.15s ease; background-color: #fff; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .form-group input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    .form-group .checkbox-wrap { display: flex; align-items: center; gap: 8px; padding-top: 4px; }
    .form-group select { cursor: pointer; }

    .kpi-section { margin-bottom: 16px; }
    .kpi-section h4 { font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border-light); }
    .kpi-section .form-grid { margin-bottom: 4px; }

    .empty-state { text-align: center; padding: 48px 16px; color: var(--text-muted); font-size: 13px; }

    .rango-card { background-color: #fff; border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 16px; margin-bottom: 10px; transition: box-shadow 0.15s ease; }
    .rango-card:hover { box-shadow: var(--shadow-sm); }
    .rango-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .rango-card-title { font-size: 13px; font-weight: 700; color: var(--primary); }
    .rango-card-subtitle { font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
    .rango-levels { display: flex; gap: 8px; flex-wrap: wrap; }
    .rango-level { display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: var(--radius-sm); font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
    .rango-level-verde { background-color: rgba(16,185,129,0.08); color: #047857; border: 1px solid rgba(16,185,129,0.15); }
    .rango-level-amarillo { background-color: rgba(245,158,11,0.08); color: #92400e; border: 1px solid rgba(245,158,11,0.15); }
    .rango-level-rojo { background-color: rgba(239,68,68,0.08); color: #b91c1c; border: 1px solid rgba(239,68,68,0.15); }

    .range-input-group { display: flex; align-items: center; gap: 8px; }
    .range-input-group label { font-size: 11px; font-weight: 600; color: var(--text-secondary); min-width: 60px; text-transform: uppercase; }
    .range-input-group input { width: 100px; padding: 6px 8px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 12px; font-family: 'JetBrains Mono', monospace; outline: none; }
    .range-input-group input:focus { border-color: var(--primary); }
    .range-input-group span { font-size: 12px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }

    .badge-status { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 999px; font-size: 10px; font-family: 'JetBrains Mono', monospace; font-weight: 600; }
    .badge-active { background-color: rgba(16,185,129,0.10); color: var(--success); border: 1px solid rgba(16,185,129,0.20); }
    .badge-inactive { background-color: rgba(239,68,68,0.10); color: var(--danger); border: 1px solid rgba(239,68,68,0.20); }

    .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: var(--radius-md); font-size: 12px; font-weight: 600; box-shadow: var(--shadow-lg); z-index: 200; animation: fadeIn 0.2s ease-out; }
    .toast-success { background-color: var(--success); color: #fff; }
    .toast-error { background-color: var(--danger); color: #fff; }

    @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
  </style>
</head>

        <h2>Gestión de Vendedores</h2>
        <div class="crud-toolbar">
          <input id="search-vendedores" class="search-bar" type="text" placeholder="Buscar vendedor..." value="${searchTerm}">
          <button class="btn-create" onclick="openCreate('vendedores')">+ Nuevo Vendedor</button>
        </div>
      </div>
      <div class="section-card">
        <div class="admin-table-wrap">
          <table class="dime-table">
            <thead><tr>
              <th style="padding:10px 12px;width:50px">ID</th>
              <th style="padding:10px 12px">Usuario</th>
              <th style="padding:10px 12px">Tienda</th>
              <th style="padding:10px 12px">Email</th>
              <th style="padding:10px 12px">País</th>
              <th style="padding:10px 12px">Plan</th>
              <th style="padding:10px 12px;text-align:center">Estado</th>
              <th style="padding:10px 12px;text-align:center;width:100px">Acciones</th>
            </tr></thead>
            <tbody>${filtered.length ? filtered.map(v => `
              <tr>
                <td style="padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:11px">${v.id}</td>
                <td style="padding:10px 12px;font-weight:600;color:var(--primary)">${v.user_name}</td>
                <td style="padding:10px 12px">${v.nombre_tienda}</td>
                <td style="padding:10px 12px;font-size:11px">${v.email}</td>
                <td style="padding:10px 12px;font-size:11px">${getPaisName(v.codigo_pais)}</td>
                <td style="padding:10px 12px"><span class="badge ${badgeClass(v.tipo_plan === 3 ? 'green' : v.tipo_plan === 2 ? 'yellow' : 'red')}" style="font-size:10px">${PLAN_MAP[v.tipo_plan] || '-'}</span></td>
                <td style="padding:10px 12px;text-align:center"><span class="badge-status ${v.esta_activo ? 'badge-active' : 'badge-inactive'}">${v.esta_activo ? 'Activo' : 'Inactivo'}</span></td>
                <td style="padding:10px 12px;text-align:center"><div class="table-actions"><button class="btn-edit" onclick="openEdit('vendedores',${v.id})">Editar</button><button class="btn-delete" onclick="openDelete('vendedores',${v.id})">Eliminar</button></div></td>
              </tr>`).join('') : `<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--text-muted)">Sin resultados</td></tr>`}</tbody>
          </table>
        </div>
      </div>`;
    document.getElementById('search-vendedores').addEventListener('input', renderVendedores);
  }

  function renderPlanes() {
    const container = document.getElementById('section-planes');
    container.innerHTML = `
      <div class="crud-header">
        <h2>Gestión de Planes</h2>
        <div class="crud-toolbar">
          <button class="btn-create" onclick="openCreate('planes')">+ Nuevo Plan</button>
        </div>
      </div>
      <div class="section-card">
        <div class="admin-table-wrap">
          <table class="dime-table">
            <thead><tr>
              <th style="padding:10px 12px;width:50px">ID</th>
              <th style="padding:10px 12px">Nombre</th>
              <th style="padding:10px 12px;text-align:right">Precio</th>
              <th style="padding:10px 12px;text-align:right">Pub. Límite</th>
              <th style="padding:10px 12px;text-align:right">Días Métrica</th>
              <th style="padding:10px 12px">Descripción</th>
              <th style="padding:10px 12px;text-align:center;width:100px">Acciones</th>
            </tr></thead>
            <tbody>${MOCK_PLANES.map(p => `
              <tr>
                <td style="padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:11px">${p.id}</td>
                <td style="padding:10px 12px;font-weight:600;color:var(--primary)">${p.nombre_plan}</td>
                <td style="padding:10px 12px;text-align:right;font-family:'JetBrains Mono',monospace">${p.precio_mensual === 0 ? 'Gratis' : '$' + p.precio_mensual.toFixed(2)}</td>
                <td style="padding:10px 12px;text-align:right;font-family:'JetBrains Mono',monospace">${p.limite_publicaciones === 9999 ? '∞' : p.limite_publicaciones}</td>
                <td style="padding:10px 12px;text-align:right;font-family:'JetBrains Mono',monospace">${p.limite_metricas_dias}</td>
                <td style="padding:10px 12px;font-size:11px;color:var(--text-secondary)">${p.descripcion}</td>
                <td style="padding:10px 12px;text-align:center"><div class="table-actions"><button class="btn-edit" onclick="openEdit('planes',${p.id})">Editar</button><button class="btn-delete" onclick="openDelete('planes',${p.id})">Eliminar</button></div></td>
              </tr>`).join('')}</tbody>
          </table>
        </div>
      </div>`;
  }

  function renderKpiRangos() {
    const container = document.getElementById('section-metricas');
    const selectedCat = (document.getElementById('select-kpi-categoria') || {}).value || 'reputacion';
    const filtered = selectedCat === 'todas' ? MOCK_KPI_RANGES : MOCK_KPI_RANGES.filter(k => k.categoria === selectedCat);
    const categorias = [...new Set(MOCK_KPI_RANGES.map(k => k.categoria))];
    const catNombres = { reputacion: 'Reputación', negocio: 'Negocio', stock: 'Stock Full', publicaciones: 'Publicaciones' };
    container.innerHTML = `
      <div class="crud-header">
        <h2>Configuración de Rangos KPI</h2>
        <div class="crud-toolbar">
          <select id="select-kpi-categoria" class="search-bar" style="width:auto;min-width:180px;cursor:pointer">
            ${categorias.map(c => `<option value="${c}" ${selectedCat === c ? 'selected' : ''}>${catNombres[c] || c}</option>`).join('')}
          </select>
        </div>
      </div>
      ${filtered.length ? filtered.map(k => {
        const verdeLabel = k.verde_max !== null ? `${k.verde_min}${k.unidad} – ${k.verde_max}${k.unidad}` : `≥ ${k.verde_min}${k.unidad}`;
        const amarilloLabel = k.amarillo_max !== null ? `${k.amarillo_min}${k.unidad} – ${k.amarillo_max}${k.unidad}` : `≥ ${k.amarillo_min}${k.unidad}`;
        const rojoLabel = k.rojo_max !== null ? `${k.rojo_min}${k.unidad} – ${k.rojo_max}${k.unidad}` : `≥ ${k.rojo_min}${k.unidad}`;
        return `<div class="rango-card">
          <div class="rango-card-header">
            <div>
              <div class="rango-card-title">${k.nombre}</div>
              <div class="rango-card-subtitle">${k.indicador}</div>
            </div>
            <button class="btn-edit" onclick="openEditRango(${k.id})">Editar rangos</button>
          </div>
          <div class="rango-levels">
            <span class="rango-level rango-level-verde">● Verde: ${verdeLabel}</span>
            <span class="rango-level rango-level-amarillo">● Amarillo: ${amarilloLabel}</span>
            <span class="rango-level rango-level-rojo">● Rojo: ${rojoLabel}</span>
          </div>
        </div>`;
      }).join('') : '<p class="empty-state">No hay KPIs configurados para esta categoría.</p>'}
      <div style="margin-top:14px;text-align:right;font-size:10px;color:var(--text-muted);font-family:'JetBrains Mono',monospace">${MOCK_KPI_RANGES.length} indicadores configurados</div>`;
    const sel = document.getElementById('select-kpi-categoria');
    if (sel) sel.addEventListener('change', renderKpiRangos);
  }

  function switchSection(section) {
    currentSection = section;
    document.querySelectorAll('.sidebar nav .nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.sidebar nav .nav-btn[data-section="${section}"]`).classList.add('active');
    document.querySelectorAll('.content-section').forEach(el => el.style.display = 'none');
    document.getElementById('section-' + section).style.display = 'block';
    const titles = { vendedores: 'Administración - Vendedores', planes: 'Administración - Planes',     metricas: 'Administración - Rangos KPI' };
    document.getElementById('topbar-title').textContent = titles[section] || 'Administración';
    if (section === 'vendedores') renderVendedores();
    else if (section === 'planes') renderPlanes();
    else if (section === 'metricas') renderKpiRangos();
  }

  function openCreate(section) {
    editingSection = section;
    editingEntity = null;
    if (section === 'vendedores') openVendedorForm(null);
    else if (section === 'planes') openPlanForm(null);
  }

  function openEdit(section, id) {
    editingSection = section;
    if (section === 'vendedores') { editingEntity = MOCK_VENDEDORES.find(v => v.id === id); openVendedorForm(editingEntity); }
    else if (section === 'planes') { editingEntity = MOCK_PLANES.find(p => p.id === id); openPlanForm(editingEntity); }
  }

  function openVendedorForm(entity) {
    const isEdit = !!entity;
    document.getElementById('modal-title').textContent = isEdit ? 'Editar Vendedor' : 'Nuevo Vendedor';
    const e = entity || { user_name: '', nombre_tienda: '', email: '', codigo_pais: 'AR', moneda_local: 'ARS', tipo_plan: 1, esta_activo: true };
    document.getElementById('modal-box').className = 'modal-box';
    document.getElementById('modal-body').innerHTML = `
      <div class="form-grid">
        <div class="form-group"><label>Usuario *</label><input id="f-user_name" type="text" value="${e.user_name}"></div>
        <div class="form-group"><label>Nombre Tienda *</label><input id="f-nombre_tienda" type="text" value="${e.nombre_tienda}"></div>
        <div class="form-group full-width"><label>Email *</label><input id="f-email" type="email" value="${e.email}"></div>
        <div class="form-group"><label>País *</label><select id="f-codigo_pais">${PAISES.map(p => `<option value="${p.codigo}" ${e.codigo_pais === p.codigo ? 'selected' : ''}>${p.nombre}</option>`).join('')}</select></div>
        <div class="form-group"><label>Moneda *</label><select id="f-moneda_local">${MONEDAS.map(m => `<option value="${m.codigo}" ${e.moneda_local === m.codigo ? 'selected' : ''}>${m.nombre}</option>`).join('')}</select></div>
        <div class="form-group"><label>Plan *</label><select id="f-tipo_plan">${MOCK_PLANES.map(p => `<option value="${p.id}" ${e.tipo_plan === p.id ? 'selected' : ''}>${p.nombre_plan}</option>`).join('')}</select></div>
        <div class="form-group"><div class="checkbox-wrap"><input id="f-esta_activo" type="checkbox" ${e.esta_activo ? 'checked' : ''}><label style="text-transform:none;letter-spacing:0;cursor:pointer">Vendedor activo</label></div></div>
      </div>`;
    document.getElementById('modal-overlay').style.display = 'flex';
  }

  function openPlanForm(entity) {
    const isEdit = !!entity;
    document.getElementById('modal-title').textContent = isEdit ? 'Editar Plan' : 'Nuevo Plan';
    const e = entity || { nombre_plan: '', precio_mensual: 0, limite_publicaciones: 10, limite_metricas_dias: 30, descripcion: '' };
    document.getElementById('modal-box').className = 'modal-box';
    document.getElementById('modal-body').innerHTML = `
      <div class="form-grid">
        <div class="form-group full-width"><label>Nombre del Plan *</label><input id="f-nombre_plan" type="text" value="${e.nombre_plan}"></div>
        <div class="form-group"><label>Precio Mensual *</label><input id="f-precio_mensual" type="number" step="0.01" min="0" value="${e.precio_mensual}"></div>
        <div class="form-group"><label>Límite Publicaciones</label><input id="f-limite_publicaciones" type="number" min="0" value="${e.limite_publicaciones}"></div>
        <div class="form-group"><label>Días de Métricas</label><input id="f-limite_metricas_dias" type="number" min="1" value="${e.limite_metricas_dias}"></div>
        <div class="form-group full-width"><label>Descripción</label><textarea id="f-descripcion">${e.descripcion}</textarea></div>
      </div>`;
    document.getElementById('modal-overlay').style.display = 'flex';
  }

  function openEditRango(id) {
    editingSection = 'metricas';
    editingEntity = MOCK_KPI_RANGES.find(k => k.id === id);
    if (!editingEntity) return showToast('KPI no encontrado', 'error');
    const k = editingEntity;
    document.getElementById('modal-title').textContent = 'Rangos: ' + k.nombre;
    document.getElementById('modal-box').className = 'modal-box wide';
    const row = (nivel, minVal, maxVal) => `
      <div style="background:var(--bg);padding:12px;border-radius:var(--radius-sm);margin-bottom:10px">
        <div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:6px">
          <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${nivel === 'verde' ? '#10B981' : nivel === 'amarillo' ? '#F59E0B' : '#EF4444'}"></span>
          ${nivel.charAt(0).toUpperCase() + nivel.slice(1)}
        </div>
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <div class="range-input-group"><label>Mínimo</label><input id="f-${nivel}-min" type="number" step="0.01" value="${minVal !== null && minVal !== undefined ? minVal : ''}" placeholder="0"></div>
          <div class="range-input-group"><label>Máximo</label><input id="f-${nivel}-max" type="number" step="0.01" value="${maxVal !== null && maxVal !== undefined ? maxVal : ''}" placeholder="∞"><span>${k.unidad}</span></div>
        </div>
      </div>`;
    document.getElementById('modal-body').innerHTML = `
      <div style="margin-bottom:14px">
        <p style="font-size:14px;font-weight:700;color:var(--primary)">${k.nombre}</p>
        <p style="font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace">${k.categoria_nombre} · ${k.indicador}</p>
      </div>
      ${row('verde', k.verde_min, k.verde_max)}
      ${row('amarillo', k.amarillo_min, k.amarillo_max)}
      ${row('rojo', k.rojo_min, k.rojo_max)}`;
    document.getElementById('modal-overlay').style.display = 'flex';
  }

  function saveEntity() {
    if (editingSection === 'vendedores') saveVendedor();
    else if (editingSection === 'planes') savePlan();
    else if (editingSection === 'metricas') saveRango();
  }

  function saveVendedor() {
    const data = {
      user_name: document.getElementById('f-user_name').value.trim(),
      nombre_tienda: document.getElementById('f-nombre_tienda').value.trim(),
      email: document.getElementById('f-email').value.trim(),
      codigo_pais: document.getElementById('f-codigo_pais').value,
      moneda_local: document.getElementById('f-moneda_local').value,
      tipo_plan: parseInt(document.getElementById('f-tipo_plan').value),
      esta_activo: document.getElementById('f-esta_activo').checked
    };
    if (!data.user_name || !data.nombre_tienda || !data.email) { showToast('Completa los campos obligatorios', 'error'); return; }
    if (editingEntity) {
      Object.assign(editingEntity, data);
      showToast('Vendedor actualizado', 'success');
    } else {
      data.id = nextVendedorId++;
      data.fecha_creacion = new Date().toISOString().split('T')[0];
      MOCK_VENDEDORES.push(data);
      showToast('Vendedor creado', 'success');
    }
    closeModal();
    renderVendedores();
  }

  function savePlan() {
    const data = {
      nombre_plan: document.getElementById('f-nombre_plan').value.trim(),
      precio_mensual: parseFloat(document.getElementById('f-precio_mensual').value) || 0,
      limite_publicaciones: parseInt(document.getElementById('f-limite_publicaciones').value) || 0,
      limite_metricas_dias: parseInt(document.getElementById('f-limite_metricas_dias').value) || 30,
      descripcion: document.getElementById('f-descripcion').value.trim()
    };
    if (!data.nombre_plan) { showToast('El nombre del plan es obligatorio', 'error'); return; }
    if (editingEntity) {
      Object.assign(editingEntity, data);
      showToast('Plan actualizado', 'success');
    } else {
      data.id = nextPlanId++;
      MOCK_PLANES.push(data);
      showToast('Plan creado', 'success');
    }
    closeModal();
    renderPlanes();
  }

  function saveRango() {
    const k = editingEntity;
    if (!k) return;
    const verdeMin = document.getElementById('f-verde-min');
    const verdeMax = document.getElementById('f-verde-max');
    const amarilloMin = document.getElementById('f-amarillo-min');
    const amarilloMax = document.getElementById('f-amarillo-max');
    const rojoMin = document.getElementById('f-rojo-min');
    const rojoMax = document.getElementById('f-rojo-max');
    if (!verdeMin || !verdeMax || !amarilloMin || !amarilloMax || !rojoMin || !rojoMax) return;
    k.verde_min = verdeMin.value !== '' ? Number(verdeMin.value) : 0;
    k.verde_max = verdeMax.value !== '' ? Number(verdeMax.value) : null;
    k.amarillo_min = amarilloMin.value !== '' ? Number(amarilloMin.value) : 0;
    k.amarillo_max = amarilloMax.value !== '' ? Number(amarilloMax.value) : null;
    k.rojo_min = rojoMin.value !== '' ? Number(rojoMin.value) : 0;
    k.rojo_max = rojoMax.value !== '' ? Number(rojoMax.value) : null;
    showToast('Rangos actualizados correctamente', 'success');
    closeModal();
    renderKpiRangos();
  }

  function openDelete(section, id) {
    deleteTarget = { section, id };
    const labels = { vendedores: 'vendedor', planes: 'plan' };
    const name = section === 'vendedores' ? (MOCK_VENDEDORES.find(v => v.id === id) || {}).user_name : (MOCK_PLANES.find(p => p.id === id) || {}).nombre_plan;
    document.getElementById('delete-msg').textContent = `¿Estás seguro de eliminar ${labels[section] || 'entidad'} "${name || id}"? Esta acción no se puede deshacer.`;
    document.getElementById('delete-modal').style.display = 'flex';
  }

  function confirmDelete() {
    if (!deleteTarget) return;
    const { section, id } = deleteTarget;
    if (section === 'vendedores') {
      MOCK_VENDEDORES = MOCK_VENDEDORES.filter(v => v.id !== id);
      showToast('Vendedor eliminado', 'success');
      closeDeleteModal();
      renderVendedores();
    } else if (section === 'planes') {
      MOCK_PLANES = MOCK_PLANES.filter(p => p.id !== id);
      showToast('Plan eliminado', 'success');
      closeDeleteModal();
      renderPlanes();
    }
    deleteTarget = null;
  }

  function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; editingEntity = null; editingSection = null; }
  function closeDeleteModal() { document.getElementById('delete-modal').style.display = 'none'; deleteTarget = null; }

  document.getElementById('user-profile-button').addEventListener('click', function(e) {
    e.stopPropagation();
    const m = document.getElementById('profile-dropdown-menu');
    m.style.display = m.style.display === 'none' ? 'block' : 'none';
  });
  document.addEventListener('click', () => {
    const m = document.getElementById('profile-dropdown-menu');
    if (m.style.display !== 'none') m.style.display = 'none';
  });
  document.getElementById('btn-signout').addEventListener('click', () => { localStorage.clear(); sessionStorage.clear(); window.location.href = '/'; });

  document.querySelectorAll('.sidebar nav .nav-btn').forEach(btn => {
    btn.addEventListener('click', function() { switchSection(this.dataset.section); });
  });

  switchSection('vendedores');
</script>
</body>
</html>
