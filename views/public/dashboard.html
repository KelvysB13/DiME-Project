<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiME | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="../../assets/icons/favicon.ico">
    <link rel="stylesheet" href="../../assets/styles/dashboard_style.css">
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="../../assets/images/DiME_LogoNuevo.png" alt="DiME" class="sidebar-logo">
            <span class="sidebar-brand">DiME</span>
        </div>

        <div class="sidebar-user">
            <div class="sidebar-avatar" id="sidebarAvatar">U</div>
            <div class="sidebar-user-info">
                <span class="sidebar-user-name" id="sidebarUserName">Usuario</span>
                <span class="sidebar-user-email" id="sidebarUserEmail">email</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <button class="nav-item active" data-section="resumen">
                <span class="nav-icon">📊</span>
                <span class="nav-label">Resumen</span>
            </button>
            <button class="nav-item" data-section="reputacion">
                <span class="nav-icon">⭐</span>
                <span class="nav-label">Reputación</span>
            </button>
            <button class="nav-item" data-section="negocio">
                <span class="nav-icon">💼</span>
                <span class="nav-label">Negocio</span>
            </button>
            <button class="nav-item" data-section="costos">
                <span class="nav-icon">💰</span>
                <span class="nav-label">Costos</span>
            </button>
            <button class="nav-item" data-section="stock">
                <span class="nav-icon">📦</span>
                <span class="nav-label">Stock Full</span>
            </button>
            <button class="nav-item" data-section="mipagina">
                <span class="nav-icon">🏪</span>
                <span class="nav-label">Mi Página</span>
            </button>
            <button class="nav-item" data-section="publicaciones">
                <span class="nav-icon">📋</span>
                <span class="nav-label">Publicaciones</span>
            </button>
            <button class="nav-item" data-section="reportes">
                <span class="nav-icon">📝</span>
                <span class="nav-label">Reportes</span>
            </button>
            <button class="nav-item" data-section="graficos">
                <span class="nav-icon">📈</span>
                <span class="nav-label">Gráficos</span>
            </button>
        </nav>

        <button id="logoutBtnSidebar" class="sidebar-logout">Cerrar Sesión</button>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <button class="hamburger" id="hamburgerBtn">☰</button>
            <div class="topbar-title">
                <span id="topbarSection">Resumen</span>
            </div>
        </header>

        <div class="content-area" id="contentArea">
            <div id="loadingSpinner" class="loading-spinner">
                <div class="spinner"></div>
                <p>Cargando tus métricas...</p>
            </div>

            <div id="section-resumen" class="section-content active">
                <div id="kpiCards"></div>
                <div class="resumen-charts" id="resumenCharts"></div>
            </div>

            <div id="section-reputacion" class="section-content">
                <div class="table-wrap">
                    <table class="dt">
                        <thead>
                            <tr><th>Indicador</th><th>Valor</th></tr>
                        </thead>
                        <tbody id="reputacionBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="section-negocio" class="section-content">
                <div class="table-wrap">
                    <table class="dt">
                        <thead>
                            <tr><th>Indicador</th><th>Valor</th></tr>
                        </thead>
                        <tbody id="negocioBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="section-costos" class="section-content">
                <div class="table-wrap">
                    <table class="dt">
                        <thead>
                            <tr><th>Indicador</th><th>Valor</th></tr>
                        </thead>
                        <tbody id="costosBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="section-stock" class="section-content">
                <div class="table-wrap">
                    <table class="dt">
                        <thead>
                            <tr><th>Indicador</th><th>Valor</th></tr>
                        </thead>
                        <tbody id="stockBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="section-mipagina" class="section-content">
                <div class="table-wrap">
                    <table class="dt">
                        <thead>
                            <tr><th>Indicador</th><th>Valor</th></tr>
                        </thead>
                        <tbody id="mipaginaBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="section-publicaciones" class="section-content">
                <div class="table-wrap">
                    <table class="dt">
                        <thead>
                            <tr>
                                <th>Título</th>
                                <th>ML ID</th>
                                <th>Tipo</th>
                                <th>Estado</th>
                                <th>Visitas</th>
                                <th>Ventas</th>
                                <th>Fotos</th>
                                <th>Video</th>
                                <th>Calidad</th>
                            </tr>
                        </thead>
                        <tbody id="publicacionesBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="section-reportes" class="section-content">
                <div class="table-wrap">
                    <table class="dt">
                        <thead>
                            <tr>
                                <th>Período</th>
                                <th>Resumen Ejecutivo</th>
                                <th>Plan de Acción</th>
                            </tr>
                        </thead>
                        <tbody id="reportesBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="section-graficos" class="section-content">
                <div class="graficos-grid" id="graficosContainer"></div>
            </div>
        </div>
    </main>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

<script>
    const apiBase = '';

    function getToken() {
        return localStorage.getItem('access_token') || sessionStorage.getItem('access_token');
    }

    function getRefreshToken() {
        return localStorage.getItem('refresh_token') || sessionStorage.getItem('refresh_token');
    }

    async function apiFetch(url, options = {}) {
        const token = getToken();
        const headers = { ...options.headers };
        if (token) {
            headers['Authorization'] = `Bearer ${token}`;
        }
        const response = await fetch(apiBase + url, { ...options, headers });
        if (response.status === 401) {
            const refreshed = await tryRefresh();
            if (refreshed) {
                const newToken = getToken();
                headers['Authorization'] = `Bearer ${newToken}`;
                return fetch(apiBase + url, { ...options, headers });
            }
            redirectToLogin();
        }
        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.detail || 'Error en la solicitud');
        }
        return response.json();
    }

    async function tryRefresh() {
        const refreshToken = getRefreshToken();
        if (!refreshToken) return false;
        try {
            const resp = await fetch(apiBase + '/auth/refresh', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ refresh_token: refreshToken })
            });
            if (!resp.ok) return false;
            const data = await resp.json();
            const storage = localStorage.getItem('access_token') ? localStorage : sessionStorage;
            storage.setItem('access_token', data.access_token);
            storage.setItem('refresh_token', data.refresh_token);
            return true;
        } catch {
            return false;
        }
    }

    function redirectToLogin() {
        localStorage.removeItem('access_token');
        localStorage.removeItem('refresh_token');
        localStorage.removeItem('user_id');
        localStorage.removeItem('user_name');
        sessionStorage.clear();
        window.location.href = '/';
    }

    function formatCurrency(val, decimals = 2) {
        if (val == null) return '-';
        const num = typeof val === 'string' ? parseFloat(val) : val;
        return num.toLocaleString('es', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
    }

    function formatNumber(val) {
        if (val == null) return '-';
        const num = typeof val === 'string' ? parseInt(val) : val;
        return num.toLocaleString('es');
    }

    function formatBool(val) {
        if (val == null) return '-';
        return val ? 'Sí' : 'No';
    }

    let dashboardData = null;

    function navigateTo(section) {
        document.querySelectorAll('.section-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));

        const sectionEl = document.getElementById('section-' + section);
        const navItem = document.querySelector(`.nav-item[data-section="${section}"]`);
        if (sectionEl) sectionEl.classList.add('active');
        if (navItem) navItem.classList.add('active');

        const labels = {
            resumen: 'Resumen', reputacion: 'Reputación', negocio: 'Negocio',
            costos: 'Costos', stock: 'Stock Full', mipagina: 'Mi Página',
            publicaciones: 'Publicaciones', reportes: 'Reportes', graficos: 'Gráficos'
        };
        document.getElementById('topbarSection').textContent = labels[section] || section;

        if (window.innerWidth <= 768) {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('visible');
        }
    }

    function initNavigation() {
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => {
                navigateTo(btn.dataset.section);
            });
        });
    }

    function initHamburger() {
        const btn = document.getElementById('hamburgerBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        btn.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('visible');
        });
        overlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('visible');
        });
    }

    function buildResumen(data) {
        const container = document.getElementById('kpiCards');
        container.innerHTML = '';

        function section(icon, title, color) {
            const sec = document.createElement('div');
            sec.className = 'ks';
            sec.innerHTML = `
                <div class="ks-header">
                    <span class="ks-header-icon">${icon}</span>
                    <span class="ks-header-title">${title}</span>
                </div>
                <div class="ks-grid"></div>
            `;
            container.appendChild(sec);
            return sec.querySelector('.ks-grid');
        }

        function card(grid, label, value, icon, color) {
            const div = document.createElement('div');
            div.className = 'kc';
            div.style.setProperty('--kc-accent', color);
            div.innerHTML = `
                <div class="kc-bar"></div>
                <div class="kc-body">
                    <div class="kc-icon">${icon}</div>
                    <div class="kc-info">
                        <div class="kc-value">${value}</div>
                        <div class="kc-label">${label}</div>
                    </div>
                </div>
            `;
            grid.appendChild(div);
        }

        const rep = data.reputacion;
        if (rep) {
            const g = section('⭐', 'Reputación', '#f59e0b');
            card(g, 'Nivel', `<span class="rb rb-${(rep.nivel_reputacion || '').toLowerCase()}">${rep.nivel_reputacion || '-'}</span>`, '⭐', '#f59e0b');
            card(g, 'Reclamos', formatNumber(rep.total_reclamos), '⚠️', '#ef4444');
        }

        const neg = data.negocio;
        if (neg) {
            const g = section('💼', 'Negocio', '#10b981');
            card(g, 'Ventas Brutas', formatCurrency(neg.ventas_brutas_moneda_local), '💰', '#10b981');
            card(g, 'Visitas', formatNumber(neg.visitas_totales), '👁️', '#3b82f6');
            card(g, 'Conversión', neg.ventas_concretadas && neg.visitas_totales ? ((neg.ventas_concretadas / neg.visitas_totales) * 100).toFixed(2) + '%' : '-', '📈', '#8b5cf6');
        }

        const cos = data.costos;
        if (cos) {
            const g = section('💰', 'Costos', '#f97316');
            card(g, 'Costos Totales', formatCurrency(cos.cargos_por_venta + cos.costos_envio + cos.inversion_ads + (cos.descuento_reputacion || 0)), '💸', '#f97316');
            card(g, 'Neto Recibido', formatCurrency(cos.neto_recibido), '✅', '#06b6d4');
        }

        const stk = data.stock_full;
        if (stk) {
            const g = section('📦', 'Stock Full', '#6366f1');
            card(g, 'Stock Score', stk.puntaje_calidad != null ? stk.puntaje_calidad + '/100' : '-', '📦', '#6366f1');
        }

        renderCharts(data.metabase, 'resumenCharts');
    }

    function renderCharts(metabase, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = '';
        if (!metabase || !metabase.charts || !metabase.charts.length) return;
        metabase.charts.forEach(chart => {
            const w = document.createElement('div');
            w.className = 'gf';
            w.innerHTML = `
                <div class="gf-title">${chart.title}</div>
                <iframe src="${chart.url}#bordered=true&titled=true" width="100%" height="380" frameborder="0" allowtransparency></iframe>
            `;
            container.appendChild(w);
        });
    }

    function buildKpiTable(bodyId, category, dataObj, metrics) {
        const tbody = document.getElementById(bodyId);
        tbody.innerHTML = '';
        if (!dataObj) return;
        const catRow = document.createElement('tr');
        catRow.className = 'cr';
        catRow.innerHTML = `<td colspan="2">${category.toUpperCase()}</td>`;
        tbody.appendChild(catRow);
        metrics.forEach(m => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${m.label}</td><td class="cv">${m.value}</td>`;
            tbody.appendChild(tr);
        });
    }

    function loadDashboard() {
        const token = getToken();
        if (!token) { redirectToLogin(); return; }

        apiFetch('/auth/me').then(me => {
            document.getElementById('sidebarUserName').textContent = me.name || me.email;
            document.getElementById('sidebarUserEmail').textContent = me.email;
            document.getElementById('sidebarAvatar').textContent = (me.name || me.email).charAt(0).toUpperCase();
        }).catch(() => {});

        apiFetch('/auth/dashboard').then(data => {
            dashboardData = data;
            buildResumen(data);

            buildKpiTable('reputacionBody', 'Reputación', data.reputacion, [
                { label: 'Nivel', value: `<span class="rb rb-${(data.reputacion?.nivel_reputacion || '').toLowerCase()}">${data.reputacion?.nivel_reputacion || '-'}</span>` },
                { label: 'Insignia', value: data.reputacion?.insignia || '-' },
                { label: 'Reclamos', value: formatNumber(data.reputacion?.total_reclamos) },
                { label: 'Cancelaciones', value: formatNumber(data.reputacion?.total_canceladas) },
                { label: 'Mediaciones', value: formatNumber(data.reputacion?.total_mediaciones) },
                { label: 'Envíos Inc.', value: formatNumber(data.reputacion?.total_envios_incorrectos) },
            ]);

            buildKpiTable('negocioBody', 'Negocio', data.negocio, [
                { label: 'Ventas Brutas', value: formatCurrency(data.negocio?.ventas_brutas_moneda_local) },
                { label: 'Ventas USD', value: formatCurrency(data.negocio?.ventas_brutas_usd) },
                { label: 'Unidades Vend.', value: formatNumber(data.negocio?.unidades_vendidas) },
                { label: 'Visitas', value: formatNumber(data.negocio?.visitas_totales) },
                { label: 'Conversión', value: data.negocio?.ventas_concretadas && data.negocio?.visitas_totales ? ((data.negocio.ventas_concretadas / data.negocio.visitas_totales) * 100).toFixed(2) + '%' : '-' },
                { label: 'Ticket Prom.', value: data.negocio?.precio_promedio_venta ? formatCurrency(data.negocio.precio_promedio_venta) : '-' },
            ]);

            buildKpiTable('costosBody', 'Costos', data.costos, [
                { label: 'Ventas Cobradas', value: formatCurrency(data.costos?.ventas_cobradas_total) },
                { label: 'Neto Recibido', value: formatCurrency(data.costos?.neto_recibido) },
                { label: 'Comisiones', value: formatCurrency(data.costos?.cargos_por_venta) },
                { label: 'Envíos', value: formatCurrency(data.costos?.costos_envio) },
                { label: 'Inversión Ads', value: formatCurrency(data.costos?.inversion_ads) },
                { label: 'Dto. Reputación', value: formatCurrency(data.costos?.descuento_reputacion) },
            ]);

            buildKpiTable('stockBody', 'Stock Full', data.stock_full, [
                { label: 'Puntaje Calidad', value: data.stock_full?.puntaje_calidad != null ? data.stock_full.puntaje_calidad + '/100' : '-' },
                { label: 'Espacios P', value: formatNumber(data.stock_full?.espacios_p_asignados) },
                { label: 'Espacios G', value: formatNumber(data.stock_full?.espacios_g_asignados) },
                { label: 'No Aptos', value: formatNumber(data.stock_full?.productos_no_aptos_venta) },
                { label: 'Sin Rotación', value: formatNumber(data.stock_full?.productos_sin_rotacion) },
                { label: 'Antigüedad', value: formatNumber(data.stock_full?.productos_antiguedad) },
            ]);

            buildKpiTable('mipaginaBody', 'Mi Página', data.mi_pagina, [
                { label: 'Banner', value: formatBool(data.mi_pagina?.tiene_banner) },
                { label: 'Logo', value: formatBool(data.mi_pagina?.tiene_logo) },
                { label: 'Carruseles', value: formatBool(data.mi_pagina?.tiene_carruseles) },
                { label: 'Categorías', value: formatBool(data.mi_pagina?.categorias_organizadas) },
            ]);

            if (data.publicaciones && data.publicaciones.length) {
                const tbody = document.getElementById('publicacionesBody');
                tbody.innerHTML = '';
                data.publicaciones.forEach(pub => {
                    const rend = pub.rendimiento || {};
                    const calidad = pub.calidad || {};
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${pub.titulo || '-'}</td>
                        <td><code>${pub.ml_item_id || '-'}</code></td>
                        <td>${pub.tipo_publicacion || '-'}</td>
                        <td><span class="sb sb-${pub.estado_publicacion || 'unknown'}">${pub.estado_publicacion || '-'}</span></td>
                        <td class="cv">${formatNumber(rend.visitas)}</td>
                        <td class="cv">${formatNumber(rend.ventas)}</td>
                        <td class="cv">${formatNumber(calidad.cantidad_fotos)}</td>
                        <td class="cv">${formatBool(calidad.tiene_video)}</td>
                        <td class="cv">${calidad.puntaje_calidad != null ? calidad.puntaje_calidad + '/100' : '-'}</td>
                    `;
                    tbody.appendChild(tr);
                });
            }

            if (data.reportes && data.reportes.length) {
                const tbody = document.getElementById('reportesBody');
                tbody.innerHTML = '';
                data.reportes.forEach(rep => {
                    const periodo = rep.fecha_inicio_periodo && rep.fecha_fin_periodo
                        ? rep.fecha_inicio_periodo + ' al ' + rep.fecha_fin_periodo : '-';
                    let plan = '-';
                    if (rep.plan_accion && typeof rep.plan_accion === 'object') {
                        const t = Object.values(rep.plan_accion);
                        plan = t.length ? t.join(', ') : 'Sin tareas';
                    }
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${periodo}</td><td>${rep.resumen_ejecutivo || '-'}</td><td>${plan}</td>`;
                    tbody.appendChild(tr);
                });
            }

            renderCharts(data.metabase, 'graficosContainer');

            document.getElementById('loadingSpinner').style.display = 'none';
            document.getElementById('contentArea').style.display = 'block';
        }).catch(err => {
            document.getElementById('loadingSpinner').innerHTML = `
                <div class="error-message">
                    <p>Error al cargar el dashboard: ${err.message}</p>
                    <button onclick="loadDashboard()" class="btn-retry">Reintentar</button>
                </div>
            `;
        });
    }

    function handleLogout() {
        localStorage.clear();
        sessionStorage.clear();
        window.location.href = '/';
    }

    document.getElementById('logoutBtnSidebar').addEventListener('click', handleLogout);

    initNavigation();
    initHamburger();
    loadDashboard();
</script>
</body>
</html>
