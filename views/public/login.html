<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiME | Inicio de Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- ICONO Y ESTILOS -->
    <link rel="icon" href="../../assets/icons/favicon.ico">
    <link rel="stylesheet" href="../../assets/styles/login_style.css">
</head>
<body>

    <!-- PANEL IZQUIERDO: FONDO MORADO CON CURVAS -->
    <div class="left-panel">

        <!-- CURVAS DECORATIVAS SVG -->
        <div class="decorative-curves">
            <svg viewBox="0 0 1200 800" preserveAspectRatio="none">
                <path class="wave-path" d="M-100,200 Q200,150 500,350 T1200,250" fill="none" stroke="white" stroke-width="1.5"/>
                <path class="wave-path" d="M-100,280 Q250,210 580,430 T1200,340" fill="none" stroke="white" stroke-width="1.5"/>
                <path class="wave-path" d="M-100,360 Q350,270 660,510 T1200,430" fill="none" stroke="white" stroke-width="1.5"/>
            </svg>
        </div>

        <!-- ICONO DE MARCA (CRUZ) -->
        <div class="brand-icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="12" y1="2" x2="12" y2="22"></line>
                <line x1="2" y1="12" x2="22" y2="12"></line>
                <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"></line>
                <line x1="4.93" y1="19.07" x2="19.07" y2="4.93"></line>
            </svg>
        </div>

        <!-- TEXTO DE BIENVENIDA -->
        <div class="content-wrap">
            <h1 class="title">
                Hola <br>DiME!<span class="hand-wave">👋🏼</span>
            </h1>
            <p class="desc">
                Administra tus métricas y obtén diagnósticos automáticos de tu tienda en Mercado Libre.
            </p>
        </div>

        <!-- PIE: GITHUB + COPYRIGHT -->
        <div class="footer">
            <a href="https://github.com/KelvysB13/DiME-Project" target="_blank" rel="noopener noreferrer" class="github-link">
                <svg fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
            </a>
            <div class="copyright">
                &copy; 2026 DiME Team. All rights reserved.
            </div>
        </div>
    </div>

    <!-- PANEL DERECHO: FORMULARIO DE LOGIN -->
    <div class="right-panel">

        <div class="form-container">

            <!-- LOGO -->
            <div class="logo-wrap">
                <img src="../../assets/images/DiME_Logo.png" alt="DiME Logo">
            </div>

            <!-- TITULO Y SUBTITULO -->
            <div>
                <h2 class="welcome-title">&iexcl;Bienvenid@!</h2>
                <p class="welcome-sub">
                    &iquest;No tienes una cuenta?
                    <a href="#">Crea una nueva ahora</a>.
                </p>
            </div>

            <!-- FORMULARIO -->
            <form class="login-form">

                <!-- CAMPO EMAIL -->
                <div class="form-group email">
                    <svg class="input-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                    <input type="email" id="email" placeholder="Correo Electr&oacute;nico">
                </div>

                <!-- CAMPO CONTRASEÑA + BOTON VISIBILIDAD -->
                <div class="form-group password">
                    <svg class="input-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                    <input type="password" id="password" placeholder="Contrase&ntilde;a">
                    <button type="button" id="togglePassword" class="toggle-btn">
                        <svg id="eyeIcon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>

                <!-- CHECKBOX RECORDAR -->
                <div class="remember-row">
                    <input type="checkbox" id="remember">
                    <label for="remember">Recordar Sesi&oacute;n</label>
                </div>

                <!-- BOTONES: INICIAR SESION + GOOGLE -->
                <div class="buttons-wrap">
                    <button type="submit" class="btn-primary">
                        Iniciar Sesi&oacute;n
                    </button>
                    <button type="button" class="btn-google">
                        <svg viewBox="0 0 48 48">
                            <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
                            <path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
                            <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
                            <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
                        </svg>
                        <span>Iniciar con Google</span>
                    </button>
                </div>

            </form>

            <!-- ENLACE OLVIDO CONTRASEÑA -->
            <div class="forgot-row">
                &iquest;Olvidaste tu contrase&ntilde;a?
                <a href="#">Haz clic aqu&iacute;</a>.
            </div>

        </div>
    </div>

<!-- SCRIPT: MOSTRAR/OCULTAR CONTRASEÑA -->
<script>
    document.getElementById('togglePassword').addEventListener('click', function () {
        const password = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        if (password.type === 'password') {
            password.type = 'text';
            icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M17.94 17.94A10.07 10.07 0 0112 20c-4.477 0-8.268-2.943-9.542-7a10.07 10.07 0 013.518-4.368"/><path stroke-linecap="round" stroke-linejoin="round" d="M8.038 8.038a3 3 0 014.924 4.924"/><path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18"/>';
        } else {
            password.type = 'password';
            icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
        }
    });
</script>
</body>
</html>
